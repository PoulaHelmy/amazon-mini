<header class="navbar">
  <div class="navbar__container">
    <a routerLink="/" class="navbar__brand">
      <i class="pi pi-shopping-bag"></i>
      <span>{{ 'APP.TITLE' | translate }}</span>
    </a>

    <nav class="navbar__nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="navbar__link">
        {{ 'NAV.HOME' | translate }}
      </a>
      <a routerLink="/products" routerLinkActive="active" class="navbar__link">
        {{ 'NAV.PRODUCTS' | translate }}
      </a>
    </nav>

    <div class="navbar__actions">
      <a routerLink="/search" class="navbar__icon-btn" [title]="'NAV.SEARCH' | translate">
        <i class="pi pi-search"></i>
      </a>

      <a routerLink="/cart" class="navbar__icon-btn navbar__cart">
        <i class="pi pi-shopping-cart"></i>
        @if (cartCount() > 0) {
          <span class="navbar__badge">{{ cartCount() }}</span>
        }
      </a>

      <button class="navbar__lang-btn" (click)="switchLanguage()">
        {{ currentLang === 'en' ? ('NAV.LANG_AR' | translate) : ('NAV.LANG_EN' | translate) }}
      </button>
    </div>
  </div>
</header>
